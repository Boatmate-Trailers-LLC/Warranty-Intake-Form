<!--
  Boatmate — Customer Warranty Intake Form (Customer-only)
  =======================================================

  STATUS
  - Customer front-end artifact

  LAST UPDATED
  - 2026-03-19

  PURPOSE
  - Collect customer-submitted warranty claims via a dedicated HTML form.
  - Submit claims as multipart/form-data to a Cloudflare Worker endpoint.
  - Preserve dealer-form parity for layout, validation, status, and loading behavior.

  HARD BUSINESS RULES (DO NOT DRIFT)
  - Customer-only submission: hidden field `claim_submitted_by=customer` is always sent.
  - Hidden field `category=Warranty` is always sent.
  - Honeypot input `website` remains present and empty by default.
  - No sold-unit logic exists in this artifact.
  - No labor-hours field exists in this artifact.
  - Do not add new file-type restrictions in this artifact.

  VALIDATION DESIGN
  - The form uses `novalidate` so browser-native validation UI is bypassed.
  - Validation is enforced in JavaScript in top-to-bottom form order:
      1) Original owner selection
      2) Warranty registration selection
      3) Original Selling Dealer required fields
      4) Customer Information required fields
      5) Warranty Claim fields required (VIN validated first; format = 17 chars, no I/O/Q)
      6) Attachments required and constrained (max 10 files; max 10MB each)
  - Error messages are user-friendly:
      • Prefer curated `FIELD_LABELS` over raw IDs
      • Fallback to DOM <label for="..."> text
      • Final fallback is raw id (never fails silently)

  SUBMISSION / INTEGRATION
  - Posts to a Cloudflare Worker endpoint (WARRANTY_ENDPOINT).
  - Expected Worker response:
      • Success: { ok: true, claimNumber: <number>, ... }
      • Error:   { ok: false, errors: [...] } or { message: "..." }
  - On success:
      • Shows a success status message including the claim number
      • Resets the form
      • Restores hidden fields + clears invalid UI state

  MAINTENANCE NOTES
  - Keep input `id` + `name` aligned with Worker parsing.
  - Update validation arrays and FIELD_LABELS when adding/removing fields.
  - Keep attachment constraints aligned with backend enforcement.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Warranty Intake</title>

    <style>
      /* -----------------------------------------------------------------------
        Base + Theme
      ------------------------------------------------------------------------ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --bm-bg: #ffffff;
        --bm-fg: #111827;
        --bm-muted: #6b7280;
        --bm-border: #d1d5db;
        --bm-focus: #2563eb;
        --bm-error: #dc2626;
        --bm-success: #16a34a;
        --bm-radius: 12px;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--bm-fg);
        background: var(--bm-bg);
      }

      .wrapper {
        max-width: 980px;
        margin: 0 auto;
      }

      /* -----------------------------------------------------------------------
        Form + Fieldsets
      ------------------------------------------------------------------------ */
      form {
        border: 1px solid var(--bm-border);
        border-radius: var(--bm-radius);
        padding: 18px;
      }

      fieldset {
        border: 1px solid var(--bm-border);
        border-radius: var(--bm-radius);
        padding: 14px;
        margin: 0 0 14px;
      }

      fieldset.bm-invalid {
        outline: 2px solid var(--bm-error);
        outline-offset: 2px;
        border-color: var(--bm-error);
      }

      legend {
        font-weight: 700;
        padding: 0 8px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--bm-border);
        border-radius: 10px;
        font-size: 14px;
        background: #fff;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid color-mix(in srgb, var(--bm-focus) 70%, transparent);
        outline-offset: 2px;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      small {
        color: var(--bm-muted);
        font-size: 12px;
      }

      /* -----------------------------------------------------------------------
        Radio group styling (horizontal options)
      ------------------------------------------------------------------------ */
      .radio-group {
        display: flex;
        gap: 1.5rem;
        margin-top: 0.25rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .radio-option {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.95rem;
        white-space: nowrap;
      }

      .radio-option input[type="radio"] {
        margin: 0;
      }

      /* -----------------------------------------------------------------------
        Layout Grids
      ------------------------------------------------------------------------ */
      .field-grid {
        display: grid;
        gap: 14px;
        align-items: start;
      }

      .field-grid--two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-wide {
        grid-column: 1 / -1;
      }

      .claim-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        align-items: start;
      }

      @media (max-width: 720px) {
        .field-grid--two {
          grid-template-columns: 1fr;
        }

        .claim-grid {
          grid-template-columns: 1fr;
        }
      }

      /* -----------------------------------------------------------------------
        Validation + Status
      ------------------------------------------------------------------------ */
      .bm-invalid {
        outline: 2px solid var(--bm-error);
        outline-offset: 1px;
        border-color: var(--bm-error);
      }

      #form-status {
        font-size: 14px;
      }

      #form-status.success {
        color: var(--bm-success);
      }

      #form-status.error {
        color: var(--bm-error);
      }

      /* -----------------------------------------------------------------------
        Submit Button + Spinner
      ------------------------------------------------------------------------ */
      .bm-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button[type="submit"] {
        appearance: none;
        border: 0;
        border-radius: var(--bm-radius);
        padding: 12px 14px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      button[disabled] {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .bm-spinner {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        display: none;
        animation: spin 0.8s linear infinite;
      }

      button.is-loading .bm-spinner {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* -----------------------------------------------------------------------
        Honeypot (anti-spam) - visually hidden
      ------------------------------------------------------------------------ */
      .hp {
        position: absolute;
        left: -10000px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <form id="warranty-form" novalidate>
        <input id="claim_submitted_by" type="hidden" name="claim_submitted_by" value="customer" />
        <input id="category" type="hidden" name="category" value="Warranty" />

        <div class="hp" aria-hidden="true">
          <label for="website">Website</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </div>

        <fieldset id="original-owner-fieldset">
          <legend>Are You The Original Owner?</legend>

          <div class="radio-group" role="radiogroup" aria-label="Are You The Original Owner?">
            <label class="radio-option" for="original_owner_yes">
              <input id="original_owner_yes" name="original_owner" type="radio" value="yes" required />
              Yes
            </label>

            <label class="radio-option" for="original_owner_no">
              <input id="original_owner_no" name="original_owner" type="radio" value="no" required />
              No
            </label>
          </div>
        </fieldset>

        <fieldset id="registration-complete-fieldset">
          <legend>Warranty Registration Complete?</legend>

          <div class="radio-group" role="radiogroup" aria-label="Warranty Registration Complete?">
            <label class="radio-option" for="warranty_registration_complete_yes">
              <input
                id="warranty_registration_complete_yes"
                name="warranty_registration_complete"
                type="radio"
                value="yes"
                required
              />
              Yes
            </label>

            <label class="radio-option" for="warranty_registration_complete_no">
              <input
                id="warranty_registration_complete_no"
                name="warranty_registration_complete"
                type="radio"
                value="no"
                required
              />
              No
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Original Selling Dealer</legend>

          <div class="field-grid field-grid--two">
            <div class="field field-wide">
              <label for="dealer_name">Dealership</label>
              <input id="dealer_name" name="dealer_name" type="text" required />
            </div>

            <div class="field field-wide">
              <label for="dealer_address">Address</label>
              <input id="dealer_address" name="dealer_address" type="text" required />
            </div>

            <div class="field">
              <label for="dealer_city">City</label>
              <input id="dealer_city" name="dealer_city" type="text" required />
            </div>

            <div class="field">
              <label for="dealer_region">State/Province/Region</label>
              <input id="dealer_region" name="dealer_region" type="text" required />
            </div>

            <div class="field">
              <label for="dealer_postal_code">Zip/Postal Code</label>
              <input id="dealer_postal_code" name="dealer_postal_code" type="text" required />
            </div>

            <div class="field">
              <label for="dealer_country">Country/Region</label>
              <input id="dealer_country" name="dealer_country" type="text" required />
            </div>

            <div class="field">
              <label for="dealer_phone">Phone</label>
              <input id="dealer_phone" name="dealer_phone" type="tel" required />
            </div>

            <div class="field">
              <label for="dealer_email">Email</label>
              <input id="dealer_email" name="dealer_email" type="email" required />
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Customer Information</legend>

          <div class="field-grid field-grid--two">
            <div class="field">
              <label for="customer_first_name">First Name</label>
              <input id="customer_first_name" name="customer_first_name" type="text" required />
            </div>

            <div class="field">
              <label for="customer_last_name">Last Name</label>
              <input id="customer_last_name" name="customer_last_name" type="text" required />
            </div>

            <div class="field field-wide">
              <label for="customer_address">Address</label>
              <input id="customer_address" name="customer_address" type="text" required />
            </div>

            <div class="field">
              <label for="customer_city">City</label>
              <input id="customer_city" name="customer_city" type="text" required />
            </div>

            <div class="field">
              <label for="customer_region">State/Province/Region</label>
              <input id="customer_region" name="customer_region" type="text" required />
            </div>

            <div class="field">
              <label for="customer_postal_code">Zip/Postal Code</label>
              <input id="customer_postal_code" name="customer_postal_code" type="text" required />
            </div>

            <div class="field">
              <label for="customer_country">Country/Region</label>
              <input id="customer_country" name="customer_country" type="text" required />
            </div>

            <div class="field">
              <label for="customer_phone">Phone</label>
              <input id="customer_phone" name="customer_phone" type="tel" required />
            </div>

            <div class="field">
              <label for="customer_email">Email</label>
              <input id="customer_email" name="customer_email" type="email" required />
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Warranty Claim Information</legend>

          <div class="claim-grid">
            <div class="field">
              <label for="vin">Trailer VIN</label>
              <input
                id="vin"
                name="vin"
                type="text"
                maxlength="17"
                pattern="[A-HJ-NPR-Z0-9]{17}"
                autocomplete="off"
                spellcheck="false"
                required
              />
            </div>

            <div class="field">
              <label for="date_of_occurrence">Date of Occurrence</label>
              <input id="date_of_occurrence" name="date_of_occurrence" type="date" required />
            </div>

            <div class="field">
              <label for="warranty_symptoms">Warranty Symptoms</label>
              <textarea id="warranty_symptoms" name="warranty_symptoms" rows="5" required></textarea>
            </div>

            <div class="field">
              <label for="warranty_request">Warranty Request</label>
              <textarea id="warranty_request" name="warranty_request" rows="5" required></textarea>
            </div>

            <div class="field field-wide">
              <label for="attachments">File Upload</label>
              <input id="attachments" name="attachments" type="file" multiple required />
              <small>Up to 10 files. Max 10MB each.</small>
            </div>
          </div>
        </fieldset>

        <div class="bm-actions">
          <button id="submit-btn" type="submit">
            <span class="btn-label">Submit</span>
            <span class="bm-spinner" aria-hidden="true"></span>
          </button>

          <span id="form-status" aria-live="polite"></span>
        </div>
      </form>
    </div>

    <script>
      (() => {
        const WARRANTY_ENDPOINT = "https://warranty-intake-form.boatmate-trailers-llc.workers.dev/";
        const MAX_FILES = 10;
        const MAX_FILE_BYTES = 10 * 1024 * 1024;
        const ORIGINAL_OWNER_NAME = "original_owner";
        const REGISTRATION_NAME = "warranty_registration_complete";
        const DEALER_REQUIRED_IDS = [
          "dealer_name",
          "dealer_address",
          "dealer_city",
          "dealer_region",
          "dealer_postal_code",
          "dealer_country",
          "dealer_phone",
          "dealer_email"
        ];
        const CUSTOMER_REQUIRED_IDS = [
          "customer_first_name",
          "customer_last_name",
          "customer_address",
          "customer_city",
          "customer_region",
          "customer_postal_code",
          "customer_country",
          "customer_phone",
          "customer_email"
        ];
        const CLAIM_REQUIRED_IDS = ["vin", "date_of_occurrence", "warranty_symptoms", "warranty_request"];
        const FIELD_LABELS = {
          dealer_name: "Dealership",
          dealer_address: "Original Selling Dealer Address",
          dealer_city: "Original Selling Dealer City",
          dealer_region: "Original Selling Dealer State/Province/Region",
          dealer_postal_code: "Original Selling Dealer Zip/Postal Code",
          dealer_country: "Original Selling Dealer Country/Region",
          dealer_phone: "Original Selling Dealer Phone",
          dealer_email: "Original Selling Dealer Email",
          customer_first_name: "Customer First Name",
          customer_last_name: "Customer Last Name",
          customer_address: "Customer Address",
          customer_city: "Customer City",
          customer_region: "Customer State/Province/Region",
          customer_postal_code: "Customer Zip/Postal Code",
          customer_country: "Customer Country/Region",
          customer_phone: "Customer Phone",
          customer_email: "Customer Email",
          vin: "Trailer VIN",
          date_of_occurrence: "Date of Occurrence",
          warranty_symptoms: "Warranty Symptoms",
          warranty_request: "Warranty Request",
          attachments: "File Upload"
        };

        const form = document.getElementById("warranty-form");
        const statusEl = document.getElementById("form-status");
        const submitBtn = document.getElementById("submit-btn");
        const btnLabel = submitBtn?.querySelector(".btn-label");
        const originalOwnerFieldset = document.getElementById("original-owner-fieldset");
        const registrationFieldset = document.getElementById("registration-complete-fieldset");

        function labelFor(id) {
          if (FIELD_LABELS[id]) return FIELD_LABELS[id];
          const lbl = document.querySelector(`label[for="${CSS.escape(id)}"]`);
          const text = lbl ? String(lbl.textContent || "").trim() : "";
          return text || id;
        }

        function requiredMsg(id) {
          return `${labelFor(id)} is required.`;
        }

        function invalidEmailMsg() {
          return "Email must be a valid email address.";
        }

        function invalidVinMsg() {
          return "Trailer VIN is required.";
        }

        function getRadioValue(name) {
          return form.querySelector(`input[name="${name}"]:checked`)?.value || "";
        }

        function markRadioInvalid(fieldset) {
          fieldset?.classList.add("bm-invalid");
        }

        function clearRadioInvalid(fieldset) {
          fieldset?.classList.remove("bm-invalid");
        }

        function setStatus(message, ok = true) {
          if (!statusEl) return;
          statusEl.textContent = message || "";
          statusEl.className = ok ? "success" : "error";
        }

        function setSubmitting(isSubmitting) {
          if (!submitBtn) return;
          submitBtn.disabled = isSubmitting;
          submitBtn.classList.toggle("is-loading", isSubmitting);
          form.setAttribute("aria-busy", isSubmitting ? "true" : "false");
          if (btnLabel) {
            btnLabel.textContent = isSubmitting ? "Submitting..." : "Submit";
          }
        }

        function markInvalid(id) {
          const el = document.getElementById(id);
          if (el) el.classList.add("bm-invalid");
        }

        function clearInvalid() {
          [...DEALER_REQUIRED_IDS, ...CUSTOMER_REQUIRED_IDS, ...CLAIM_REQUIRED_IDS, "attachments"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.classList.remove("bm-invalid");
          });
          clearRadioInvalid(originalOwnerFieldset);
          clearRadioInvalid(registrationFieldset);
        }

        function isValidEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || "").trim().toLowerCase());
        }

        function isValidVin(vin) {
          return /^[A-HJ-NPR-Z0-9]{17}$/.test(String(vin || "").trim().toUpperCase());
        }

        function validateFiles(fileInput) {
          const files = fileInput?.files ? Array.from(fileInput.files) : [];
          if (files.length === 0) {
            return "At least one attachment is required.";
          }
          if (files.length > MAX_FILES) {
            return `Too many attachments. Maximum is ${MAX_FILES} files per submission.`;
          }
          for (const f of files) {
            if (f.size > MAX_FILE_BYTES) {
              return `Attachment "${f.name}" is too large. Maximum size is 10MB per file.`;
            }
          }
          return null;
        }

        function wireFieldValidation() {
          [...DEALER_REQUIRED_IDS, ...CUSTOMER_REQUIRED_IDS, ...CLAIM_REQUIRED_IDS, "attachments"].forEach((id) => {
            const el = document.getElementById(id);
            if (!el) return;

            const handler = () => {
              if (id === "attachments") {
                if (!validateFiles(el)) el.classList.remove("bm-invalid");
                return;
              }

              const val = String(el.value || "").trim();
              if (val) el.classList.remove("bm-invalid");
            };

            el.addEventListener("input", handler);
            el.addEventListener("change", handler);
            el.addEventListener("blur", handler);
          });

          [
            { name: ORIGINAL_OWNER_NAME, fieldset: originalOwnerFieldset },
            { name: REGISTRATION_NAME, fieldset: registrationFieldset }
          ].forEach(({ name, fieldset }) => {
            const radios = form.querySelectorAll(`input[name="${name}"]`);
            radios.forEach((radio) => {
              radio.addEventListener("change", () => {
                if (getRadioValue(name)) clearRadioInvalid(fieldset);
              });
            });
          });
        }

        async function handleSubmit(e) {
          e.preventDefault();
          setStatus("");
          clearInvalid();

          const vinEl = document.getElementById("vin");
          if (vinEl) vinEl.value = String(vinEl.value || "").trim().toUpperCase();

          const errors = [];

          const originalOwner = getRadioValue(ORIGINAL_OWNER_NAME);
          if (!originalOwner) {
            errors.push('Please select "Yes" or "No" for "Are You The Original Owner?"');
            markRadioInvalid(originalOwnerFieldset);
          }

          const registrationComplete = getRadioValue(REGISTRATION_NAME);
          if (!registrationComplete) {
            errors.push('Please select "Yes" or "No" for "Warranty Registration Complete?"');
            markRadioInvalid(registrationFieldset);
          }

          for (const id of DEALER_REQUIRED_IDS) {
            const el = document.getElementById(id);
            const val = el ? String(el.value || "").trim() : "";
            if (!val) {
              errors.push(requiredMsg(id));
              markInvalid(id);
              continue;
            }
            if (id === "dealer_email" && !isValidEmail(val)) {
              errors.push(invalidEmailMsg());
              markInvalid(id);
            }
          }

          for (const id of CUSTOMER_REQUIRED_IDS) {
            const el = document.getElementById(id);
            const val = el ? String(el.value || "").trim() : "";
            if (!val) {
              errors.push(requiredMsg(id));
              markInvalid(id);
              continue;
            }
            if (id === "customer_email" && !isValidEmail(val)) {
              errors.push(invalidEmailMsg());
              markInvalid(id);
            }
          }

          if (vinEl) {
            const vinVal = String(vinEl.value || "").trim();
            if (!vinVal) {
              errors.push(requiredMsg("vin"));
              markInvalid("vin");
            } else if (!isValidVin(vinVal)) {
              errors.push(invalidVinMsg());
              markInvalid("vin");
            }
          }

          for (const id of CLAIM_REQUIRED_IDS) {
            if (id === "vin") continue;
            const el = document.getElementById(id);
            const val = el ? String(el.value || "").trim() : "";
            if (!val) {
              errors.push(requiredMsg(id));
              markInvalid(id);
            }
          }

          const fileInput = document.getElementById("attachments");
          const fileErr = validateFiles(fileInput);
          if (fileErr) {
            errors.push(fileErr);
            markInvalid("attachments");
          }

          if (errors.length) {
            setStatus(errors[0], false);
            return;
          }

          const formData = new FormData(form);
          setSubmitting(true);

          try {
            const resp = await fetch(WARRANTY_ENDPOINT, { method: "POST", body: formData });
            const data = await resp.json().catch(() => null);

            if (!resp.ok || !data || data.ok !== true) {
              const msg =
                (data && (data.message || (Array.isArray(data.errors) ? data.errors.join(" ") : ""))) ||
                `Submission failed (HTTP ${resp.status}).`;
              setStatus(msg, false);
              return;
            }

            setStatus(`Claim #${data.claimNumber} submitted successfully.`, true);
            form.reset();
            clearInvalid();

            const submitter = form.querySelector('input[name="claim_submitted_by"]');
            const category = form.querySelector('input[name="category"]');
            const website = form.querySelector('input[name="website"]');
            if (submitter) submitter.value = "customer";
            if (category) category.value = "Warranty";
            if (website) website.value = "";
          } catch (err) {
            setStatus("Network error while submitting. Please try again.", false);
          } finally {
            setSubmitting(false);
          }
        }

        wireFieldValidation();
        form.addEventListener("submit", handleSubmit);
      })();
    </script>
  </body>
</html>
